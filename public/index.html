<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5分間通話</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ===== 各画面 ===== */
    .view { display: none; flex-direction: column; align-items: center; width: 100%; }
    .view.active { display: flex; }

    /* 待機前 */
    #view-idle { gap: 28px; }
    .app-title { font-size: 22px; font-weight: 600; letter-spacing: 0.02em; }
    .app-sub { font-size: 14px; color: rgba(255,255,255,0.45); }

    .btn-start {
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(110,231,160,0.12);
      border: 2px solid rgba(110,231,160,0.4);
      color: #6ee7a0; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
    }
    .btn-start:hover { background: rgba(110,231,160,0.2); transform: scale(1.03); }
    .btn-start svg { width: 36px; height: 36px; }

    /* 待機中 */
    #view-waiting { gap: 24px; }
    .spinner {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid rgba(110,231,160,0.15);
      border-top-color: #6ee7a0;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .waiting-text { font-size: 16px; color: rgba(255,255,255,0.7); }
    .waiting-sub { font-size: 13px; color: rgba(255,255,255,0.35); }

    /* 通話中 */
    #view-call { gap: 16px; padding-top: 12px; }

    .status-label {
      font-size: 13px; letter-spacing: 0.06em;
      color: #6ee7a0; font-weight: 500;
    }

    .avatar-wrap {
      position: relative;
      width: 140px; height: 140px;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(110,231,160,0.35);
    }
    .avatar-ring-outer {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 1.5px solid rgba(110,231,160,0.12);
    }
    .avatar {
      width: 116px; height: 116px; border-radius: 50%;
      background: #2d2d50;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }

    .user-name { font-size: 20px; font-weight: 500; margin-top: 4px; }
    .user-sub { font-size: 13px; color: rgba(255,255,255,0.4); }

    /* タイマー */
    .timer-block {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 10px 32px;
      text-align: center;
      margin-top: 4px;
    }
    .timer-label { font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: 0.08em; margin-bottom: 2px; }
    .timer-value {
      font-size: 30px; font-weight: 500; letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      color: #6ee7a0; transition: color 0.5s;
    }
    .timer-value.warn { color: #e24b4a; }

    /* 音声波形 */
    .wave {
      display: flex; align-items: flex-end; gap: 3px; height: 36px;
      margin: 4px 0;
    }
    .wave-bar {
      width: 4px; border-radius: 2px;
      background: rgba(110,231,160,0.45);
      transition: height 0.18s ease;
    }

    /* コントロールボタン */
    .controls { display: flex; gap: 20px; margin-top: 8px; }
    .ctrl {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .ctrl-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 0.5px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .ctrl-icon:hover { background: rgba(255,255,255,0.14); }
    .ctrl-icon.muted { background: rgba(226,75,74,0.2); border-color: rgba(226,75,74,0.4); }
    .ctrl-icon svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.85); stroke-width: 1.8; fill: none; }
    .ctrl-icon.muted svg { stroke: #e24b4a; }
    .ctrl-label { font-size: 11px; color: rgba(255,255,255,0.38); }

    /* 終了ボタン */
    .btn-end {
      width: 68px; height: 68px; border-radius: 50%;
      background: #e24b4a; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-top: 4px; transition: background 0.2s, transform 0.15s;
    }
    .btn-end:hover { background: #c73c3b; transform: scale(1.05); }
    .btn-end svg { width: 26px; height: 26px; stroke: white; stroke-width: 2; fill: none; }
    .btn-end-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }

    /* 終了画面 */
    #view-ended { gap: 20px; }
    .ended-icon { font-size: 52px; }
    .ended-title { font-size: 20px; font-weight: 500; }
    .ended-sub { font-size: 14px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.6; }
    .btn-again {
      margin-top: 8px; padding: 12px 36px;
      border-radius: 999px;
      background: rgba(110,231,160,0.12);
      border: 1.5px solid rgba(110,231,160,0.35);
      color: #6ee7a0; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-again:hover { background: rgba(110,231,160,0.22); }
  </style>
</head>
<body>
<div class="screen">

  <!-- 待機前 -->
  <div id="view-idle" class="view active">
    <div class="app-title">5分間通話</div>
    <div class="app-sub">見知らぬ誰かと、5分だけ話す</div>
    <div id="waiting-count-display" style="font-size:13px; color:rgba(110,231,160,0.8); background:rgba(110,231,160,0.08); border:0.5px solid rgba(110,231,160,0.25); border-radius:999px; padding:6px 18px;">● 待機中の人数を取得中…</div>
    <button class="btn-start" id="btn-start">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.8 19.8 0 0 1 1.61 3.4 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72 12.8 12.8 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6.29 6.29l1.42-1.42a2 2 0 0 1 2.11-.45 12.8 12.8 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      通話を始める
    </button>
  </div>

  <!-- 待機中 -->
  <div id="view-waiting" class="view">
    <div class="spinner"></div>
    <div class="waiting-text">相手を探しています…</div>
    <div class="waiting-sub">もう1人がアクセスするとつながります</div>
    <button class="btn-again" id="btn-cancel" style="margin-top:8px">キャンセル</button>
  </div>

  <!-- 通話中 -->
  <div id="view-call" class="view">
    <div class="status-label">通話中</div>
    <div class="avatar-wrap">
      <div class="avatar-ring-outer"></div>
      <div class="avatar-ring"></div>
      <div class="avatar">👤</div>
    </div>
    <div class="user-name">見知らぬ誰か</div>
    <div class="user-sub">マッチング済み</div>
    <div class="timer-block">
      <div class="timer-label">残り時間</div>
      <div class="timer-value" id="timer-display">05:00</div>
    </div>
    <div class="wave" id="wave"></div>
    <div class="controls">
      <div class="ctrl" id="ctrl-mic" onclick="toggleMic()">
        <div class="ctrl-icon" id="mic-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>
        <span class="ctrl-label" id="mic-label">ミュート</span>
      </div>
      <div class="ctrl">
        <button class="btn-end" id="btn-end" onclick="endCall()">
          <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.8 12.8 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A2 2 0 0 1 10.68 13.31zM1 1l22 22"/><path d="M3.59 3.59A19.8 19.8 0 0 0 1.61 12a19.8 19.8 0 0 0 3.07 8.63A2 2 0 0 0 6.86 22H9a2 2 0 0 0 2-1.72 12.8 12.8 0 0 0 .7-2.81 2 2 0 0 0-.45-2.11l-1.27-1.27"/></svg>
        </button>
        <div class="btn-end-label">終了</div>
      </div>
      <div class="ctrl" id="ctrl-spk" onclick="toggleSpeaker()">
        <div class="ctrl-icon" id="spk-icon">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </div>
        <span class="ctrl-label">スピーカー</span>
      </div>
    </div>
  </div>

  <!-- 終了 -->
  <div id="view-ended" class="view">
    <div class="ended-icon" id="ended-icon">⏰</div>
    <div class="ended-title" id="ended-title">5分が終わりました</div>
    <div class="ended-sub" id="ended-sub">また新しい誰かと話しますか？</div>
    <button class="btn-again" onclick="restart()">もう一度</button>
  </div>

</div>

<!-- 音声出力先（非表示） -->
<audio id="remote-audio" autoplay playsinline></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let room = null;
  let pc = null;         // RTCPeerConnection
  let localStream = null;
  let timerInterval = null;
  let secondsLeft = 300;
  let isMuted = false;
  let isSpeakerOff = false;

  // ICE サーバー（STUN のみ。ローカルLANなら十分）
  const RTC_CONFIG = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  };

  // ===== 画面切替 =====
  function showView(id) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ===== 音声波形アニメーション =====
  const waveEl = document.getElementById("wave");
  for (let i = 0; i < 20; i++) {
    const b = document.createElement("div");
    b.className = "wave-bar";
    b.style.height = "6px";
    waveEl.appendChild(b);
  }
  let waveActive = false;
  function animateWave() {
    if (!waveActive) return;
    waveEl.querySelectorAll(".wave-bar").forEach(b => {
      b.style.height = (Math.random() * 28 + 6) + "px";
    });
    setTimeout(animateWave, 180);
  }

  // ===== タイマー =====
  function startTimer() {
    secondsLeft = 300;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      secondsLeft--;
      updateTimerDisplay();
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        endCall("time-up");
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = String(Math.floor(secondsLeft / 60)).padStart(2, "0");
    const s = String(secondsLeft % 60).padStart(2, "0");
    const el = document.getElementById("timer-display");
    el.textContent = `${m}:${s}`;
    el.classList.toggle("warn", secondsLeft <= 30);
  }

  // ===== マイク取得 & キューに参加 =====
  document.getElementById("btn-start").onclick = async () => {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      alert("マイクの使用を許可してください。");
      return;
    }
    showView("view-waiting");
    socket.emit("join-queue");
  };

  document.getElementById("btn-cancel").onclick = () => {
    socket.emit("leave", { room });
    cleanup();
    showView("view-idle");
  };

  // ===== マッチング成立 =====
  socket.on("matched", async ({ room: r, initiator }) => {
    room = r;
    showView("view-call");
    waveActive = true;
    animateWave();
    startTimer();

    // RTCPeerConnection を作成
    pc = new RTCPeerConnection(RTC_CONFIG);

    // ローカル音声を追加
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    // リモート音声を受信
    pc.ontrack = (e) => {
      document.getElementById("remote-audio").srcObject = e.streams[0];
    };

    // ICE 候補をサーバー経由で相手に送る
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        socket.emit("ice-candidate", { room, candidate: e.candidate });
      }
    };

    if (initiator) {
      // オファーを作って送る
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit("offer", { room, offer });
    }
  });

  socket.on("waiting", () => {
    // すでに waiting 画面なので何もしない
  });

  // ===== WebRTC シグナリング =====
  socket.on("offer", async ({ offer }) => {
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("answer", { room, answer });
  });

  socket.on("answer", async ({ answer }) => {
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on("ice-candidate", async ({ candidate }) => {
    try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (e) {}
  });

  // ===== 時間切れ（サーバーから） =====
  socket.on("time-up", () => endCall("time-up"));

  // ===== 相手が切断 =====
  socket.on("partner-left", () => endCall("partner-left"));

  // ===== 待機人数の更新 =====
  socket.on("waiting-count", ({ count }) => {
    const el = document.getElementById("waiting-count-display");
    if (!el) return;
    if (count === 0) {
      el.textContent = "● 今すぐつながれます！";
    } else {
      el.textContent = `● 待機中: ${count}人`;
    }
  });

  // ===== 通話終了処理 =====
  function endCall(reason) {
    if (room) socket.emit("leave", { room });
    cleanup();

    const icon = document.getElementById("ended-icon");
    const title = document.getElementById("ended-title");
    const sub = document.getElementById("ended-sub");

    if (reason === "time-up") {
      icon.textContent = "⏰";
      title.textContent = "5分が終わりました";
      sub.textContent = "また新しい誰かと話しますか？";
    } else if (reason === "partner-left") {
      icon.textContent = "👋";
      title.textContent = "相手が通話を終了しました";
      sub.textContent = "また新しい誰かと話しますか？";
    } else {
      icon.textContent = "📵";
      title.textContent = "通話を終了しました";
      sub.textContent = "また新しい誰かと話しますか？";
    }
    showView("view-ended");
  }

  function cleanup() {
    clearInterval(timerInterval);
    waveActive = false;
    waveEl.querySelectorAll(".wave-bar").forEach(b => b.style.height = "6px");

    if (pc) { pc.close(); pc = null; }
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    document.getElementById("remote-audio").srcObject = null;
    room = null;
    isMuted = false;
    isSpeakerOff = false;
    document.getElementById("mic-icon").classList.remove("muted");
    document.getElementById("mic-label").textContent = "ミュート";
  }

  // ===== ミュート切替 =====
  function toggleMic() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    document.getElementById("mic-icon").classList.toggle("muted", isMuted);
    document.getElementById("mic-label").textContent = isMuted ? "ミュート中" : "ミュート";
  }

  // ===== スピーカー切替（音量 on/off） =====
  function toggleSpeaker() {
    isSpeakerOff = !isSpeakerOff;
    const audio = document.getElementById("remote-audio");
    audio.muted = isSpeakerOff;
    document.getElementById("spk-icon").classList.toggle("muted", isSpeakerOff);
  }

  // ===== もう一度 =====
  function restart() {
    showView("view-idle");
  }
</script>
</body>
</html>
